<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: #6c63ff;
      color: #fff;
      padding: 24px;
    }

    .header h1 {
      font-size: 1.6rem;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }

    .input-row button {
      padding: 10px 18px;
      background: #fff;
      color: #6c63ff;
      border: none;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #e8e6ff;
    }

    .filters {
      display: flex;
      border-bottom: 1px solid #eee;
    }

    .filters button {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.85rem;
      color: #888;
      transition: all 0.2s;
    }

    .filters button.active {
      color: #6c63ff;
      border-bottom: 2px solid #6c63ff;
      font-weight: 600;
    }

    .todo-list {
      list-style: none;
      max-height: 420px;
      overflow-y: auto;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    .todo-item:hover {
      background: #fafafa;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item .text {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      word-break: break-word;
    }

    .todo-item.done .text {
      text-decoration: line-through;
      color: #aaa;
    }

    .done-icon {
      display: none;
      font-size: 1.1rem;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      flex-shrink: 0;
    }

    .todo-item.done .done-icon {
      display: inline;
    }

    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .todo-item .edit-btn,
    .todo-item .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .todo-item .edit-btn:hover {
      color: #6c63ff;
    }

    .todo-item .delete-btn:hover {
      color: #e55;
    }

    .todo-item.editing .text {
      display: none;
    }

    .todo-item .edit-input {
      display: none;
      flex: 1;
      padding: 4px 8px;
      border: 1.5px solid #6c63ff;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
    }

    .todo-item.editing .edit-input {
      display: block;
    }

    .todo-item.editing .edit-btn {
      color: #6c63ff;
    }

    .todo-item.editing .delete-btn {
      display: none;
    }

    .todo-item.editing input[type="checkbox"] {
      pointer-events: none;
      opacity: 0.4;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #bbb;
      font-size: 0.9rem;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-top: 1px solid #eee;
      font-size: 0.82rem;
      color: #aaa;
    }

    .footer button {
      background: none;
      border: none;
      color: #e55;
      cursor: pointer;
      font-size: 0.82rem;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .footer button:hover {
      background: #ffeaea;
    }

    .loading {
      text-align: center;
      padding: 30px;
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Yapılacaklar</h1>
      <div class="input-row">
        <input id="todoInput" type="text" placeholder="Yeni görev ekle..." maxlength="120">
        <button id="addBtn">+</button>
      </div>
    </div>

    <div class="filters">
      <button class="active" data-filter="all">Tümü</button>
      <button data-filter="active">Bekleyen</button>
      <button data-filter="done">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todoList"><li class="loading">Yükleniyor...</li></ul>

    <div class="footer">
      <span id="countLabel">0 görev kaldı</span>
      <button id="clearDoneBtn">Tamamlananları sil</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://yekoboanojckyxoknrka.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlla29ib2Fub2pja3l4b2tucmthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwOTAsImV4cCI6MjA5MjI4NTA5MH0.5DgwUtFiPylFiJ_TQxxfh1oPTJOjM8QkzuvScUIH8Lc';

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let todos = [];
    let filter = 'all';

    const input = document.getElementById('todoInput');
    const list = document.getElementById('todoList');
    const countLabel = document.getElementById('countLabel');

    async function loadTodos() {
      const { data, error } = await sb
        .from('todos')
        .select('*')
        .order('created_at', { ascending: false });
      if (!error) {
        todos = data;
        render();
      }
    }

    async function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      const { data, error } = await sb.from('todos').insert({ text, done: false }).select().single();
      if (!error) {
        todos.unshift(data);
        render();
      }
    }

    async function toggleTodo(todo) {
      const { error } = await sb.from('todos').update({ done: !todo.done }).eq('id', todo.id);
      if (!error) {
        todo.done = !todo.done;
        render();
      }
    }

    async function updateTodoText(todo, newText) {
      const { error } = await sb.from('todos').update({ text: newText }).eq('id', todo.id);
      if (!error) todo.text = newText;
    }

    async function deleteTodo(id) {
      const { error } = await sb.from('todos').delete().eq('id', id);
      if (!error) {
        todos = todos.filter(t => t.id !== id);
        render();
      }
    }

    async function clearDone() {
      const doneIds = todos.filter(t => t.done).map(t => t.id);
      if (!doneIds.length) return;
      const { error } = await sb.from('todos').delete().in('id', doneIds);
      if (!error) {
        todos = todos.filter(t => !t.done);
        render();
      }
    }

    function render() {
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      list.innerHTML = '';

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">Görev yok</li>';
      } else {
        filtered.forEach(todo => {
          const li = document.createElement('li');
          li.className = 'todo-item' + (todo.done ? ' done' : '');

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = todo.done;
          cb.addEventListener('change', () => toggleTodo(todo));

          const doneIcon = document.createElement('span');
          doneIcon.className = 'done-icon';
          doneIcon.textContent = '🌟';

          const span = document.createElement('span');
          span.className = 'text';
          span.textContent = todo.text;

          const editInput = document.createElement('input');
          editInput.type = 'text';
          editInput.className = 'edit-input';
          editInput.value = todo.text;
          editInput.maxLength = 120;

          async function commitEdit() {
            const val = editInput.value.trim();
            if (val && val !== todo.text) await updateTodoText(todo, val);
            else editInput.value = todo.text;
            li.classList.remove('editing');
            span.textContent = todo.text;
            editInput.value = todo.text;
          }

          editInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') commitEdit();
            if (e.key === 'Escape') {
              editInput.value = todo.text;
              li.classList.remove('editing');
            }
          });

          editInput.addEventListener('blur', commitEdit);

          const edit = document.createElement('button');
          edit.className = 'edit-btn';
          edit.textContent = '✎';
          edit.title = 'Düzenle';
          edit.addEventListener('click', () => {
            if (li.classList.contains('editing')) {
              commitEdit();
            } else {
              li.classList.add('editing');
              editInput.focus();
              editInput.select();
            }
          });

          const del = document.createElement('button');
          del.className = 'delete-btn';
          del.textContent = '×';
          del.title = 'Sil';
          del.addEventListener('click', () => deleteTodo(todo.id));

          li.appendChild(cb);
          li.appendChild(span);
          li.appendChild(doneIcon);
          li.appendChild(editInput);
          li.appendChild(edit);
          li.appendChild(del);
          list.appendChild(li);
        });
      }

      const remaining = todos.filter(t => !t.done).length;
      countLabel.textContent = `${remaining} görev kaldı`;
    }

    document.getElementById('addBtn').addEventListener('click', addTodo);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('clearDoneBtn').addEventListener('click', clearDone);

    loadTodos();
  </script>
</body>
</html>
